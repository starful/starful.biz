<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO & SNS Meta Tags -->
    <title>{% block title %}{% endblock %} Starful | IT転職・面接対策バイブル</title>
    <meta name="description" content="{% block meta_desc %}IT業界の全職種における面接頻出質問、模範解答、キラー逆質問을完全網羅。{% endblock %}">
    
    <link rel="canonical" href="{{ request.base_url | string }}{{ request.url.path | trim('/') }}">

    <!-- Google tag & Ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8780435268193938" crossorigin="anonymous"></script>    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7CCENHDZHH"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-7CCENHDZHH');
    </script>

    <link rel="stylesheet" href="/static/css/style.css?v=13.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-container">
            <div class="header-top">
                <a href="/" class="logo-wrapper">
                    <img src="/static/img/logo.png" alt="Starful" class="logo-img" onerror="this.style.display='none'; this.parentNode.innerText='STARFUL'">
                </a>
                <div class="nav-links">
                    <a href="/practice">AI面接官</a>
                    <a href="/about">運営者情報</a>
                </div>
            </div>
            
            {% block header_filters %}{% endblock %}
        </div>
    </header>

    {% block content %}{% endblock %}

    <footer class="footer">
        <p><strong>Starful Project</strong><br>IT転職の面接を攻略せよ。職種別ガチ面接対策</p>
        <p style="margin-top: 10px; font-size: 0.8rem;">
            <a href="/about" style="color: #555; margin: 0 10px;">運営者情報</a> | 
            <a href="/privacy" style="color: #555; margin: 0 10px;">プライバシーポリシー</a> | 
            &copy; 2026 Starful
        </p>
    </footer>
</body>
</html>
