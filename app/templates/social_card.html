<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ seo_title }}</title>
    <meta name="description" content="{{ seo_desc }}">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <link rel="canonical" href="{{ page_url }}">
    <meta property="og:type" content="article">
    <meta property="og:site_name" content="Starful">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:title" content="{{ seo_title }}">
    <meta property="og:description" content="{{ seo_desc }}">
    <meta property="og:url" content="{{ card_url }}">
    <meta property="og:image" content="{{ og_image_abs }}">
    <meta property="og:image:secure_url" content="{{ og_image_abs }}">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="{{ og_image_width }}">
    <meta property="og:image:height" content="{{ og_image_height }}">
    <meta property="og:image:alt" content="{{ seo_title }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@x_starfulbiz">
    <meta name="twitter:title" content="{{ seo_title }}">
    <meta name="twitter:description" content="{{ seo_desc }}">
    <meta name="twitter:image" content="{{ og_image_abs }}">
    <meta name="twitter:image:alt" content="{{ seo_title }}">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <main class="detail-body" style="max-width:720px;margin:48px auto;padding:0 16px;">
        <img src="{{ og_image_abs }}" alt="{{ seo_title }}" width="1200" height="630" style="width:100%;height:auto;border-radius:12px;">
        <h1 style="margin-top:24px;font-size:1.5rem;">{{ title }}</h1>
        <p style="color:#64748b;line-height:1.6;">{{ seo_desc }}</p>
        <p style="margin-top:24px;"><a href="{{ page_url }}" style="font-weight:700;">面接ガイドを見る →</a></p>
    </main>
</body>
</html>
