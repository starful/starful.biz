# Base image (requirements.txt) + app image with layer cache
substitutions:
  _REGION: us-central1
  _REPO: starful-repo
  _BASE_IMAGE: starful-web-base
  _APP_IMAGE: starful-web

steps:
  # 0. Pull previous images for layer cache (ignore if first build)
  - name: gcr.io/cloud-builders/docker
    id: pull-cache
    entrypoint: bash
    args:
      - -c
      - |
        docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:latest || true
        docker pull ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:latest || true

  # 1. Base: Python deps (cached when requirements.txt unchanged)
  - name: gcr.io/cloud-builders/docker
    id: build-base
    args:
      - build
      - -f
      - Dockerfile.base
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:latest
      - -t
      - ${_BASE_IMAGE}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:latest
      - .
    waitFor:
      - pull-cache

  # 2. App: copy code + build_data (uses local base tag from step 1)
  - name: gcr.io/cloud-builders/docker
    id: build-app
    args:
      - build
      - --build-arg
      - BASE_IMAGE=${_BASE_IMAGE}:latest
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:latest
      - --cache-from
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:latest
      - .
    waitFor:
      - build-base

  # 3. Push images before deploy (Cloud Run needs image in registry)
  - name: gcr.io/cloud-builders/docker
    id: push-images
    entrypoint: bash
    args:
      - -c
      - |
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:$BUILD_ID
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:$BUILD_ID
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:latest
    waitFor:
      - build-app

  # 4. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-app
    entrypoint: gcloud
    args:
      - run
      - deploy
      - starful-biz
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-secrets
      - GEMINI_API_KEY=STARFUL_BIZ_GEMINI_API_KEY:latest,/secrets/FIREBASE_KEY=starfu-biz-firebase:latest
    waitFor:
      - push-images

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_BASE_IMAGE}:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_APP_IMAGE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
